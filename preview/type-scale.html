<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#171A2C; padding:20px 24px; }
  .row { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid #1C2030; }
  .row:last-child { border-bottom:none; }
  .meta { width:110px; flex-shrink:0; }
  .token { font-size:10px; color:#5DBBA0; font-family:monospace; }
  .size  { font-size:10px; color:#5A6280; margin-top:2px; }
  .specimen { color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head><body>
  <div class="row">
    <div class="meta"><div class="token">--text-6xl</div><div class="size">60px · 800</div></div>
    <div class="specimen" style="font-size:48px;font-weight:800;letter-spacing:-0.03em;line-height:1;">티켓 예매</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-5xl</div><div class="size">48px · 700</div></div>
    <div class="specimen" style="font-size:38px;font-weight:700;letter-spacing:-0.03em;">KT Cloud Sports</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-4xl</div><div class="size">36px · 700</div></div>
    <div class="specimen" style="font-size:30px;font-weight:700;letter-spacing:-0.02em;">경기 일정 및 티켓</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-2xl</div><div class="size">24px · 600</div></div>
    <div class="specimen" style="font-size:22px;font-weight:600;">Section Header / 섹션 헤더</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-lg</div><div class="size">18px · 600</div></div>
    <div class="specimen" style="font-size:17px;font-weight:600;">Card Title — 카드 제목</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-md</div><div class="size">16px · 400</div></div>
    <div class="specimen" style="font-size:15px;font-weight:400;color:#C8CCDA;">Body text — 최고의 스포츠 티켓 플랫폼</div>
  </div>
  <div class="row">
    <div class="meta"><div class="token">--text-sm</div><div class="size">13px · 400</div></div>
    <div class="specimen" style="font-size:12px;font-weight:400;color:#8B93B0;">Caption · 잔여 좌석: 42석 · 2025.06.15</div>
  </div>
</body></html>
