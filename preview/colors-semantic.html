<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#171A2C; padding:20px; }
  .row { display:flex; gap:10px; }
  .item { flex:1; border-radius:8px; padding:14px 12px; display:flex; align-items:center; gap:10px; }
  .dot  { width:36px; height:36px; border-radius:50%; flex-shrink:0; }
  .name { font-size:13px; font-weight:600; color:#fff; }
  .hex  { font-size:11px; color:#8B93B0; font-family:monospace; margin-top:2px; }
  .use  { font-size:10px; margin-top:2px; }
</style></head><body>
<div class="row">
  <div class="item" style="background:#1C2030;border:1px solid #3ECF8E33;">
    <div class="dot" style="background:#3ECF8E;"></div>
    <div><div class="name">Success</div><div class="hex">#3ECF8E</div><div class="use" style="color:#3ECF8E;">완료 · 성공</div></div>
  </div>
  <div class="item" style="background:#1C2030;border:1px solid #F59E0B33;">
    <div class="dot" style="background:#F59E0B;"></div>
    <div><div class="name">Warning</div><div class="hex">#F59E0B</div><div class="use" style="color:#F59E0B;">경고 · 주의</div></div>
  </div>
  <div class="item" style="background:#1C2030;border:1px solid #EF444433;">
    <div class="dot" style="background:#EF4444;"></div>
    <div><div class="name">Error</div><div class="hex">#EF4444</div><div class="use" style="color:#EF4444;">오류 · 실패</div></div>
  </div>
  <div class="item" style="background:#1C2030;border:1px solid #3B82F633;">
    <div class="dot" style="background:#3B82F6;"></div>
    <div><div class="name">Info</div><div class="hex">#3B82F6</div><div class="use" style="color:#3B82F6;">정보 · 안내</div></div>
  </div>
</div>
</body></html>
