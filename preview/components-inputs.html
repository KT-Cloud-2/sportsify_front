<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#171A2C; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }
  .field { display:flex; flex-direction:column; gap:5px; }
  label { font-size:11px; font-weight:600; color:#8B93B0; letter-spacing:0.04em; }
  input, select { font-family:'Noto Sans KR',sans-serif; width:100%; padding:10px 14px; background:#1C2030; border:1px solid #3D4464; border-radius:8px; color:#fff; font-size:14px; outline:none; }
  .focused { border-color:#5DBBA0; box-shadow:0 0 0 3px rgba(93,187,160,0.2); }
  .error-input { border-color:#EF4444; }
  .error-msg { font-size:11px; color:#EF4444; margin-top:2px; }
  .row { display:flex; gap:12px; }
  .row .field { flex:1; }
  .search-wrap { position:relative; }
  .search-wrap input { padding-left:36px; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#5A6280; font-size:14px; }
</style></head><body>
  <div class="row">
    <div class="field">
      <label>이름 NAME</label>
      <input type="text" placeholder="홍길동" />
    </div>
    <div class="field">
      <label>이메일 EMAIL</label>
      <input class="focused" type="email" value="user@ktcloud.com" />
    </div>
  </div>
  <div class="field">
    <label>종목 SPORT</label>
    <select><option>⚾ 야구</option><option>⚽ 축구</option><option>🎮 e스포츠</option></select>
  </div>
  <div class="field">
    <label>검색 SEARCH</label>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="팀 또는 경기 검색..." />
    </div>
  </div>
  <div class="field">
    <label>전화번호 PHONE</label>
    <input class="error-input" type="tel" value="010-1234" />
    <div class="error-msg">올바른 전화번호를 입력해 주세요.</div>
  </div>
</body></html>
