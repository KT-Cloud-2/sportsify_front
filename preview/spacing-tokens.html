<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#171A2C; padding:20px 24px; }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .bar-wrap { flex:1; height:20px; display:flex; align-items:center; }
  .bar { height:14px; background:#5DBBA0; border-radius:3px; opacity:0.85; }
  .token { font-size:10px; color:#5DBBA0; font-family:monospace; width:70px; flex-shrink:0; }
  .val   { font-size:10px; color:#5A6280; width:32px; text-align:right; }
</style></head><body>
  <div class="row"><div class="token">--space-1</div><div class="bar-wrap"><div class="bar" style="width:4px;"></div></div><div class="val">4px</div></div>
  <div class="row"><div class="token">--space-2</div><div class="bar-wrap"><div class="bar" style="width:8px;"></div></div><div class="val">8px</div></div>
  <div class="row"><div class="token">--space-3</div><div class="bar-wrap"><div class="bar" style="width:12px;"></div></div><div class="val">12px</div></div>
  <div class="row"><div class="token">--space-4</div><div class="bar-wrap"><div class="bar" style="width:16px;"></div></div><div class="val">16px</div></div>
  <div class="row"><div class="token">--space-6</div><div class="bar-wrap"><div class="bar" style="width:24px;"></div></div><div class="val">24px</div></div>
  <div class="row"><div class="token">--space-8</div><div class="bar-wrap"><div class="bar" style="width:32px;"></div></div><div class="val">32px</div></div>
  <div class="row"><div class="token">--space-12</div><div class="bar-wrap"><div class="bar" style="width:48px;"></div></div><div class="val">48px</div></div>
  <div class="row"><div class="token">--space-16</div><div class="bar-wrap"><div class="bar" style="width:64px;"></div></div><div class="val">64px</div></div>
  <div class="row"><div class="token">--space-20</div><div class="bar-wrap"><div class="bar" style="width:80px;"></div></div><div class="val">80px</div></div>
  <div class="row"><div class="token">--space-24</div><div class="bar-wrap"><div class="bar" style="width:96px;"></div></div><div class="val">96px</div></div>
</body></html>
