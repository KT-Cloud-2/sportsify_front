<!DOCTYPE html><html><head><meta charset="utf-8">
<style>
  @font-face {
  font-family: 'Noto Sans KR';
  src: url('../fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#171A2C; padding:20px; }
  .row { display:flex; gap:6px; align-items:flex-end; }
  .swatch { flex:1; border-radius:6px; display:flex; flex-direction:column; align-items:center; }
  .block { width:100%; border-radius:6px 6px 0 0; }
  .label { font-size:10px; color:#8B93B0; margin-top:5px; font-family:monospace; text-align:center; }
  .num   { font-size:9px; color:#5A6280; text-align:center; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="block" style="height:24px;background:#F8F9FA;"></div><div class="label">#F8F9FA</div><div class="num">50</div></div>
  <div class="swatch"><div class="block" style="height:30px;background:#ECEEF4;"></div><div class="label">#ECEEF4</div><div class="num">100</div></div>
  <div class="swatch"><div class="block" style="height:36px;background:#C8CCDA;"></div><div class="label">#C8CCDA</div><div class="num">200</div></div>
  <div class="swatch"><div class="block" style="height:42px;background:#8B93B0;"></div><div class="label">#8B93B0</div><div class="num">300</div></div>
  <div class="swatch"><div class="block" style="height:48px;background:#5A6280;"></div><div class="label">#5A6280</div><div class="num">400</div></div>
  <div class="swatch"><div class="block" style="height:54px;background:#3D4464;"></div><div class="label">#3D4464</div><div class="num">500</div></div>
  <div class="swatch"><div class="block" style="height:60px;background:#2A2F45;"></div><div class="label">#2A2F45</div><div class="num">600</div></div>
  <div class="swatch"><div class="block" style="height:66px;background:#1C2030;"></div><div class="label">#1C2030</div><div class="num">700</div></div>
  <div class="swatch"><div class="block" style="height:72px;background:#141828;border:1px solid #3D4464;"></div><div class="label">#141828</div><div class="num">800</div></div>
  <div class="swatch"><div class="block" style="height:78px;background:#0D1020;border:1px solid #3D4464;"></div><div class="label">#0D1020</div><div class="num">900</div></div>
</div>
</body></html>
