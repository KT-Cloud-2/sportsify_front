<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Sportify UI Kit — Print</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif; background:#fff; color:#fff; -webkit-font-smoothing:antialiased; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    .page {
      width: 297mm;
      min-height: 210mm;
      background: #171A2C;
      position: relative;
      overflow: hidden;
      break-before: page;
      break-inside: avoid;
      display: flex;
      flex-direction: column;
    }
    .page:first-child { break-before: auto; }

    .page-label {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 9px; font-weight: 700;
      color: rgba(93,187,160,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 999;
    }

    @page { size: A4 landscape; margin: 0; }
    @media print {
      body { background: #171A2C; }
      .page { width: 297mm; min-height: 210mm; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C = {
  dark:'#171A2C', card:'#1C2030', elevated:'#2A2F45',
  teal:'#5DBBA0', tealBlue:'#4EA8A9', tealLight:'#DBF9E8', tealDim:'#3D8C7E', deep:'#0E2421',
  red:'#E8003D', green:'#1B6B3A', orange:'#F97316', purple:'#7B2FBE',
  border:'#3D4464', fg1:'#FFFFFF', fg2:'#C8CCDA', fg3:'#8B93B0', fg4:'#5A6280',
  success:'#3ECF8E', warning:'#F59E0B', error:'#EF4444', info:'#3B82F6',
};

function Badge({ children, variant='teal', style={} }) {
  const v = {
    teal:    {bg:'rgba(93,187,160,0.15)', color:C.teal,    bd:'rgba(93,187,160,0.3)'},
    green:   {bg:'rgba(62,207,142,0.12)', color:C.success, bd:'rgba(62,207,142,0.25)'},
    yellow:  {bg:'rgba(245,158,11,0.12)', color:C.warning, bd:'rgba(245,158,11,0.25)'},
    gray:    {bg:C.elevated,             color:C.fg3,     bd:C.border},
    baseball:{bg:'rgba(232,0,61,0.15)',  color:'#ff8fa3', bd:'rgba(232,0,61,0.3)'},
    soccer:  {bg:'rgba(27,107,58,0.2)',  color:'#4ade80', bd:'rgba(27,107,58,0.4)'},
    basketball:{bg:'rgba(249,115,22,0.15)',color:'#fdba74',bd:'rgba(249,115,22,0.3)'},
    solid:   {bg:C.teal,                 color:C.deep,    bd:C.teal},
  }[variant]||{bg:C.elevated,color:C.fg3,bd:C.border};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,borderRadius:9999,padding:'3px 9px',fontSize:10,fontWeight:600,background:v.bg,color:v.color,border:`1px solid ${v.bd}`,...style}}>{children}</span>;
}

function Btn({ children, variant='primary', style={} }) {
  const v = {
    primary:  {bg:C.teal,   color:C.deep, bd:'none'},
    secondary:{bg:'transparent',color:C.teal,bd:`1.5px solid ${C.teal}`},
    ghost:    {bg:C.card,   color:C.fg2,  bd:`1px solid ${C.border}`},
  }[variant]||{bg:C.teal,color:C.deep,bd:'none'};
  return <span style={{display:'inline-flex',alignItems:'center',borderRadius:9999,padding:'8px 16px',fontSize:13,fontWeight:600,background:v.bg,color:v.color,border:v.bd,...style}}>{children}</span>;
}

/* ── NAV ── */
function Nav({ active }) {
  const items = ['홈','내 티켓','팀 채팅','알림 설정','대시보드'];
  return (
    <nav style={{background:'rgba(23,26,44,0.97)',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 24px',height:52,gap:24,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginRight:12}}>
        <img src="../../assets/logo.svg" width="26" height="24" alt="logo" />
        <span style={{fontWeight:800,fontSize:14,color:C.teal}}>Sportify</span>
      </div>
      {items.map(item => (
        <span key={item} style={{fontSize:12,fontWeight:item===active?700:500,color:item===active?C.teal:C.fg3,borderBottom:item===active?`2px solid ${C.teal}`:'2px solid transparent',padding:'0 2px',height:'100%',display:'flex',alignItems:'center'}}>{item}</span>
      ))}
      <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
        <Badge variant="green"><span style={{width:5,height:5,borderRadius:'50%',background:C.success,display:'inline-block'}}></span> 라이브</Badge>
        <div style={{width:28,height:28,borderRadius:'50%',background:C.elevated,border:`2px solid ${C.teal}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.teal}}>K</div>
      </div>
    </nav>
  );
}

const sportMeta = {
  BASEBALL:   {label:'야구',  icon:'⚾', color:C.red,    badge:'baseball'},
  SOCCER:     {label:'축구',  icon:'⚽', color:C.green,  badge:'soccer'},
  BASKETBALL: {label:'농구',  icon:'🏀', color:C.orange, badge:'basketball'},
};
const matches = [
  {id:1,sport:'BASEBALL',   home:'KT Wiz',     away:'두산 베어스',date:'2025.06.15',time:'18:30',venue:'수원KT위즈파크',  price:25000,seats:142},
  {id:2,sport:'BASEBALL',   home:'KT Wiz',     away:'LG 트윈스', date:'2025.06.18',time:'19:00',venue:'수원KT위즈파크',  price:30000,seats:8},
  {id:3,sport:'SOCCER',     home:'수원 FC',    away:'전북 현대', date:'2025.06.20',time:'20:00',venue:'수원월드컵경기장',price:18000,seats:330},
  {id:4,sport:'BASKETBALL', home:'KT 소닉붐',  away:'현대모비스',date:'2025.06.24',time:'19:00',venue:'수원KT아레나',    price:22000,seats:88},
  {id:5,sport:'BASKETBALL', home:'KT 소닉붐',  away:'서울 삼성', date:'2025.06.27',time:'18:00',venue:'수원KT아레나',    price:22000,seats:210},
  {id:6,sport:'SOCCER',     home:'수원 삼성',  away:'울산 HD',  date:'2025.06.22',time:'16:00',venue:'수원월드컵경기장',price:20000,seats:0},
];

/* ── PAGE 1: HOME ── */
function PageHome() {
  return (
    <div className="page">
      <div className="page-label">01 · Home</div>
      <Nav active="홈" />
      <div style={{flex:1,padding:'20px 28px',overflow:'hidden'}}>
        <div style={{background:`linear-gradient(135deg,${C.deep},#1a2840)`,border:`1px solid ${C.border}`,borderRadius:14,padding:'24px 32px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',position:'relative',overflow:'hidden'}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:'0.1em',color:C.teal,textTransform:'uppercase',marginBottom:6}}>2025 시즌 · SPORTIFY</div>
            <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em',marginBottom:8,lineHeight:1.2}}>야구 · 축구 · 농구<br/>한 곳에서 예매하세요</h1>
            <p style={{color:C.fg3,fontSize:11,marginBottom:14}}>실시간 대기열 · 좌석 선택 · 결제까지 원스톱</p>
            <div style={{display:'flex',gap:8}}><Btn>대기열 입장 체험</Btn><Btn variant="secondary">경기 일정 보기</Btn></div>
          </div>
          <div style={{position:'absolute',right:40,top:'50%',transform:'translateY(-50%)',fontSize:48,opacity:.07}}>🏟️</div>
        </div>
        <div style={{display:'flex',gap:7,marginBottom:16}}>
          {['전체','⚾ 야구','⚽ 축구','🏀 농구'].map((s,i)=>(
            <span key={s} style={{padding:'5px 12px',borderRadius:9999,fontSize:11,fontWeight:600,background:i===0?C.teal:C.card,color:i===0?C.deep:C.fg3,border:`1px solid ${i===0?C.teal:C.border}`}}>{s}</span>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {matches.slice(0,6).map(m => {
            const sm = sportMeta[m.sport];
            return (
              <div key={m.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
                <div style={{background:`linear-gradient(135deg,${sm.color}18,${sm.color}30)`,padding:'10px 13px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${sm.color}30`}}>
                  <span style={{fontSize:20}}>{sm.icon}</span>
                  <Badge variant={sm.badge}>{sm.label}</Badge>
                </div>
                <div style={{padding:'10px 13px'}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:5}}>{m.home} <span style={{color:C.fg4,fontWeight:400}}>vs</span> {m.away}</div>
                  <div style={{fontSize:10,color:C.fg3,marginBottom:2}}>📅 {m.date} · {m.time}</div>
                  <div style={{fontSize:10,color:C.fg3,marginBottom:8}}>📍 {m.venue}</div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span style={{fontSize:14,fontWeight:800,color:C.teal}}>₩{m.price.toLocaleString()}~</span>
                    <Badge variant={m.seats===0?'gray':m.seats<20?'yellow':'green'}>{m.seats===0?'매진':m.seats<20?'마감 임박':'예매 가능'}</Badge>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── PAGE 2: QUEUE ── */
function PageQueue() {
  const match = matches[0];
  return (
    <div className="page">
      <div className="page-label">02 · 대기열</div>
      <Nav active="홈" />
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:420,textAlign:'center'}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.08em',color:C.fg4,textTransform:'uppercase',marginBottom:14}}>실시간 대기열</div>
          <div style={{fontSize:12,color:C.fg3,marginBottom:4}}>⚾ {match.home} vs {match.away} · {match.date}</div>
          <div style={{margin:'20px auto',width:110,height:110,borderRadius:'50%',border:`3px solid ${C.border}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid ${C.teal}`,clipPath:'inset(0 47% 0 0 round 50%)'}}></div>
            <div style={{fontSize:32,fontWeight:800,color:C.teal,lineHeight:1}}>247</div>
            <div style={{fontSize:10,color:C.fg3}}>대기 순번</div>
          </div>
          <div style={{background:C.elevated,borderRadius:9999,height:5,margin:'0 0 10px',overflow:'hidden'}}>
            <div style={{height:'100%',background:C.teal,borderRadius:9999,width:'53%'}}></div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.fg4,marginBottom:18}}>
            <span>전체 대기: 1,843명</span><span>진행률: 53%</span>
          </div>
          <div style={{background:C.elevated,borderRadius:9,padding:'10px 14px',marginBottom:16,display:'flex',justifyContent:'space-between',fontSize:12}}>
            <span style={{color:C.fg3}}>예상 대기 시간</span>
            <span style={{fontWeight:700,color:C.warning}}>약 16분</span>
          </div>
          <div style={{fontSize:11,color:C.fg4,lineHeight:1.6,background:C.elevated,borderRadius:8,padding:'9px 12px',textAlign:'left'}}>
            💡 창을 닫아도 <strong style={{color:C.fg3}}>30초 이내 재접속</strong>하면 순번이 유지됩니다.<br/>
            인당 최대 <strong style={{color:C.fg3}}>4매</strong>까지 구매 가능합니다.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PAGE 3: SEAT SELECTION ── */
function PageSeat() {
  const match = matches[0];
  const rows = ['A','B','C','D','E','F','G','H'];
  const sold = ['A1','A3','B2','B6','C1','D3','E2','F5'];
  const reserved = ['A2','B4','C7','D1','E5'];
  const chosen = ['C3','C4'];
  const st = (s) => sold.includes(s)?'sold':reserved.includes(s)?'reserved':chosen.includes(s)?'selected':'free';
  const sc = {free:C.elevated,sold:'#1a1a24',reserved:'#2a1a3a',selected:C.teal};
  const tc = {free:C.fg4,sold:'#3a3a4a',reserved:'#5a3a6a',selected:C.deep};
  return (
    <div className="page">
      <div className="page-label">03 · 좌석 선택</div>
      <Nav active="홈" />
      <div style={{flex:1,padding:'16px 24px',display:'grid',gridTemplateColumns:'1fr 280px',gap:16,overflow:'hidden'}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <span style={{fontSize:20}}>⚾</span>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>KT Wiz <span style={{color:C.fg4,fontWeight:400}}>vs</span> 두산 베어스</div>
              <div style={{fontSize:10,color:C.fg3}}>2025.06.15 18:30 · 수원KT위즈파크</div>
            </div>
            <div style={{marginLeft:'auto',fontSize:11,color:C.warning,background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:6,padding:'3px 9px'}}>⏱ 13:42</div>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:14}}>
            {['1루측 ₩25K','3루측 ₩21K','외야 ₩15K','VIP ₩50K'].map((z,i)=>(
              <span key={z} style={{padding:'4px 10px',borderRadius:9999,fontSize:10,fontWeight:600,background:i===0?C.teal:C.elevated,color:i===0?C.deep:C.fg3,border:`1px solid ${i===0?C.teal:C.border}`}}>{z}</span>
            ))}
          </div>
          <div style={{background:'linear-gradient(180deg,rgba(93,187,160,0.07),transparent)',border:`1.5px solid ${C.teal}33`,borderRadius:'40% 40% 0 0',textAlign:'center',padding:'5px 0',marginBottom:10,fontSize:9,color:C.teal,fontWeight:600}}>— 필드 —</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {rows.map(row=>(
              <div key={row} style={{display:'flex',gap:4,alignItems:'center'}}>
                <span style={{fontSize:8,color:C.fg4,width:12,textAlign:'center'}}>{row}</span>
                {Array.from({length:10},(_,i)=>{
                  const seat=`${row}${i+1}`, s=st(seat);
                  return <div key={seat} style={{width:26,height:22,borderRadius:3,background:sc[s],color:tc[s],display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,fontWeight:600,border:s==='selected'?`1.5px solid ${C.teal}`:`1px solid ${C.border}`,boxShadow:s==='selected'?`0 0 6px rgba(93,187,160,0.4)`:'none'}}>{i+1}</div>;
                })}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:12,marginTop:10}}>
            {[['free','선택 가능'],['selected','선택됨'],['reserved','예약중'],['sold','매진']].map(([s,l])=>(
              <div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:10,height:9,borderRadius:2,background:sc[s],border:`1px solid ${C.border}`}}></div>
                <span style={{fontSize:8,color:C.fg3}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,alignSelf:'start'}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>주문 요약</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.fg3,marginBottom:3}}>구역</div>
            <div style={{fontWeight:600,fontSize:12}}>1루측 — ₩25,000/석</div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.fg3,marginBottom:6}}>선택 좌석 (2/4)</div>
            <div style={{display:'flex',gap:5}}>
              {['C3','C4'].map(s=><span key={s} style={{background:'rgba(93,187,160,0.12)',color:C.teal,border:'1px solid rgba(93,187,160,0.3)',borderRadius:5,padding:'2px 8px',fontSize:11,fontWeight:700}}>{s}</span>)}
            </div>
          </div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:11,color:C.fg3}}>소계</span>
              <span style={{fontSize:11}}>₩50,000</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontSize:13,fontWeight:700}}>합계</span>
              <span style={{fontSize:17,fontWeight:800,color:C.teal}}>₩50,000</span>
            </div>
          </div>
          <Btn style={{width:'100%',justifyContent:'center',borderRadius:9}}>결제하기 →</Btn>
        </div>
      </div>
    </div>
  );
}

/* ── PAGE 4: CHECKOUT ── */
function PageCheckout() {
  const methods = [{id:'kakao',label:'카카오페이',emoji:'💛'},{id:'naver',label:'네이버페이',emoji:'💚'},{id:'card',label:'신용카드',emoji:'💳'},{id:'transfer',label:'계좌이체',emoji:'🏦'}];
  return (
    <div className="page">
      <div className="page-label">04 · 결제</div>
      <Nav active="홈" />
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:28,width:500}}>
          <div style={{display:'flex',gap:0,marginBottom:24}}>
            {['정보 입력','결제 수단','완료'].map((lb,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',position:'relative'}}>
                {i<2&&<div style={{position:'absolute',top:13,left:'50%',right:'-50%',height:2,background:i+1<2?C.teal:C.border}}></div>}
                <div style={{width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,zIndex:1,background:i+1<=2?C.teal:C.elevated,color:i+1<=2?C.deep:C.fg4,border:`2px solid ${i+1<=2?C.teal:C.border}`}}>{i+1}</div>
                <div style={{fontSize:9,color:i+1<=2?C.teal:C.fg4,marginTop:4}}>{lb}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>결제 수단 선택</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            {methods.map((m,i)=>(
              <div key={m.id} style={{padding:'12px 14px',border:`1.5px solid ${i===0?C.teal:C.border}`,borderRadius:9,background:i===0?'rgba(93,187,160,0.08)':C.elevated,display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:20}}>{m.emoji}</span>
                <span style={{fontSize:12,fontWeight:600,color:i===0?C.teal:C.fg2}}>{m.label}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:18,borderTop:`1px solid ${C.border}`,paddingTop:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:10,color:C.fg3}}>결제 금액</div>
              <div style={{fontSize:20,fontWeight:800,color:C.teal}}>₩50,000</div>
            </div>
            <Btn style={{padding:'11px 24px'}}>결제 완료</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PAGE 5: MY TICKETS ── */
