<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sportify — UI Kit</title>
  <meta name="ext-resource-dependency" content="../../assets/logo.svg" data-resource-id="logoSvg" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />

  <template id="__bundler_thumbnail" data-bg-color="#171A2C">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#171A2C"/>
      <!-- Ticket card shapes -->
      <rect x="24" y="60" width="152" height="36" rx="8" fill="#1C2030" stroke="#3D4464" stroke-width="1"/>
      <rect x="24" y="104" width="152" height="36" rx="8" fill="#1C2030" stroke="#3D4464" stroke-width="1"/>
      <rect x="24" y="148" width="72" height="36" rx="8" fill="#5DBBA0" opacity="0.9"/>
      <!-- Teal accent circle -->
      <circle cx="158" cy="42" r="22" fill="none" stroke="#5DBBA0" stroke-width="3" opacity="0.7"/>
      <circle cx="158" cy="42" r="10" fill="#5DBBA0" opacity="0.5"/>
      <!-- Sport icons placeholder -->
      <rect x="32" y="68" width="20" height="20" rx="4" fill="#E8003D" opacity="0.8"/>
      <rect x="32" y="112" width="20" height="20" rx="4" fill="#1B6B3A" opacity="0.8"/>
    </svg>
  </template>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html,body,#root { height:100%; }
    body { font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif; background:#171A2C; color:#fff; -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#1C2030; } ::-webkit-scrollbar-thumb { background:#3D4464; border-radius:3px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    @keyframes queuePulse { 0%,100%{box-shadow:0 0 0 0 rgba(93,187,160,0.4)} 50%{box-shadow:0 0 0 12px rgba(93,187,160,0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── TOKENS ── */
const C = {
  dark:'#171A2C', card:'#1C2030', elevated:'#2A2F45',
  teal:'#5DBBA0', tealBlue:'#4EA8A9', tealLight:'#DBF9E8', tealDim:'#3D8C7E', deep:'#0E2421',
  red:'#E8003D', green:'#1B6B3A', orange:'#F97316', purple:'#7B2FBE',
  border:'#3D4464', fg1:'#FFFFFF', fg2:'#C8CCDA', fg3:'#8B93B0', fg4:'#5A6280',
  success:'#3ECF8E', warning:'#F59E0B', error:'#EF4444', info:'#3B82F6',
};

/* ── ATOMS ── */
function Badge({ children, variant='teal', style={} }) {
  const v = {
    teal:    {bg:'rgba(93,187,160,0.15)',  color:C.teal,    bd:'rgba(93,187,160,0.3)'},
    green:   {bg:'rgba(62,207,142,0.12)',  color:C.success, bd:'rgba(62,207,142,0.25)'},
    red:     {bg:'rgba(239,68,68,0.12)',   color:C.error,   bd:'rgba(239,68,68,0.25)'},
    yellow:  {bg:'rgba(245,158,11,0.12)',  color:C.warning, bd:'rgba(245,158,11,0.25)'},
    gray:    {bg:C.elevated,              color:C.fg3,     bd:C.border},
    baseball:{bg:'rgba(232,0,61,0.15)',   color:'#ff8fa3', bd:'rgba(232,0,61,0.3)'},
    soccer:  {bg:'rgba(27,107,58,0.2)',   color:'#4ade80', bd:'rgba(27,107,58,0.4)'},
    basketball:{bg:'rgba(249,115,22,0.15)',color:'#fdba74', bd:'rgba(249,115,22,0.3)'},
    esports: {bg:'rgba(123,47,190,0.2)',  color:'#c084fc', bd:'rgba(123,47,190,0.35)'},
    solid:   {bg:C.teal,                  color:C.deep,    bd:C.teal},
  }[variant]||{bg:C.elevated,color:C.fg3,bd:C.border};
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,borderRadius:9999,padding:'3px 10px',fontSize:11,fontWeight:600,background:v.bg,color:v.color,border:`1px solid ${v.bd}`,...style}}>{children}</span>;
}

function Btn({ children, variant='primary', size='md', onClick, disabled, style={} }) {
  const sz = {sm:{padding:'6px 14px',fontSize:12},md:{padding:'10px 20px',fontSize:14},lg:{padding:'13px 28px',fontSize:16}}[size]||{padding:'10px 20px',fontSize:14};
  const v = {
    primary:  {background:C.teal,    color:C.deep,  border:'none'},
    secondary:{background:'transparent',color:C.teal,border:`1.5px solid ${C.teal}`},
    ghost:    {background:C.card,    color:C.fg2,   border:`1px solid ${C.border}`},
    danger:   {background:C.error,   color:'#fff',  border:'none'},
    red:      {background:C.red,     color:'#fff',  border:'none'},
    orange:   {background:C.orange,  color:'#fff',  border:'none'},
    purple:   {background:C.purple,  color:'#fff',  border:'none'},
  }[variant]||{background:C.teal,color:C.deep,border:'none'};
  return <button onClick={onClick} disabled={disabled} style={{fontFamily:'inherit',fontWeight:600,cursor:disabled?'not-allowed':'pointer',borderRadius:9999,border:v.border,background:disabled?C.elevated:v.background,color:disabled?C.fg4:v.color,transition:'all 150ms',lineHeight:1,...sz,...style}}>{children}</button>;
}

function Toggle({ value, onChange }) {
  return (
    <div onClick={() => onChange(!value)} style={{width:44,height:24,borderRadius:9999,background:value?C.teal:C.elevated,border:`1px solid ${value?C.teal:C.border}`,cursor:'pointer',position:'relative',transition:'all 200ms',flexShrink:0}}>
      <div style={{position:'absolute',top:3,left:value?22:3,width:16,height:16,borderRadius:'50%',background:value?C.deep:'#fff',transition:'left 200ms'}}></div>
    </div>
  );
}

/* ── DATA ── */
const sportMeta = {
  BASEBALL:   {label:'야구',   icon:'⚾', color:C.red,    badge:'baseball',   kt:'KT Wiz'},
  SOCCER:     {label:'축구',   icon:'⚽', color:C.green,  badge:'soccer',     kt:'수원 FC'},
  BASKETBALL: {label:'농구',   icon:'🏀', color:C.orange, badge:'basketball', kt:'KT 소닉붐'},
};

const matches = [
  {id:1, sport:'BASEBALL',   home:'KT Wiz',       away:'두산 베어스', date:'2025.06.15', time:'18:30', venue:'수원KT위즈파크',    price:25000, seats:142, status:'OPEN'},
  {id:2, sport:'BASEBALL',   home:'KT Wiz',       away:'LG 트윈스',  date:'2025.06.18', time:'19:00', venue:'수원KT위즈파크',    price:30000, seats:8,   status:'OPEN'},
  {id:3, sport:'SOCCER',     home:'수원 FC',      away:'전북 현대',  date:'2025.06.20', time:'20:00', venue:'수원월드컵경기장',  price:18000, seats:330, status:'OPEN'},
  {id:4, sport:'SOCCER',     home:'수원 삼성',    away:'울산 HD',   date:'2025.06.22', time:'16:00', venue:'수원월드컵경기장',  price:20000, seats:0,   status:'SCHEDULED'},
  {id:5, sport:'BASKETBALL', home:'KT 소닉붐',    away:'현대모비스', date:'2025.06.24', time:'19:00', venue:'수원KT아레나',      price:22000, seats:88,  status:'OPEN'},
  {id:6, sport:'BASKETBALL', home:'KT 소닉붐',    away:'서울 삼성',  date:'2025.06.27', time:'18:00', venue:'수원KT아레나',      price:22000, seats:210, status:'OPEN'},
];

const myTickets = [
  {id:'KTS-84601', sport:'BASEBALL',   match:'KT Wiz vs 두산',   date:'2025.05.20', seat:'1루측 C4', price:25000, status:'USED'},
  {id:'KTS-84720', sport:'SOCCER',     match:'수원 FC vs 전북',  date:'2025.06.20', seat:'3루측 A7', price:18000, status:'CONFIRMED'},
  {id:'KTS-84721', sport:'BASEBALL',   match:'KT Wiz vs 두산',  date:'2025.06.15', seat:'1루측 B3', price:25000, status:'CONFIRMED'},
  {id:'KTS-84600', sport:'BASKETBALL', match:'KT 소닉붐 vs 모비스',date:'2025.04.10',seat:'VIP D2',  price:35000, status:'CANCELLED'},
];

/* ── NAV ── */
function NavBar({ screen, setScreen }) {
  const items = [{id:'home',label:'홈'},{id:'mytickets',label:'내 티켓'},{id:'chat',label:'팀 채팅'},{id:'notifications',label:'알림 설정'},{id:'admin',label:'대시보드'}];
  return (
    <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(23,26,44,0.96)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',padding:'0 28px',height:58,gap:28}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginRight:12,cursor:'pointer'}} onClick={()=>setScreen('home')}>
        <img src={window.__resources && window.__resources.logoSvg ? window.__resources.logoSvg : "../../assets/logo.svg"} width="30" height="28" alt="logo" />
        <span style={{fontWeight:800,fontSize:16,color:C.teal,letterSpacing:'-0.02em'}}>Sportify</span>
      </div>
      {items.map(it => (
        <button key={it.id} onClick={()=>setScreen(it.id)} style={{background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:['home','detail','queue','seat','checkout'].includes(screen)&&it.id==='home'?700:screen===it.id?700:500,color:(['home','detail','queue','seat','checkout'].includes(screen)&&it.id==='home')||screen===it.id?C.teal:C.fg3,padding:'0 2px',height:'100%',borderBottom:(['home','detail','queue','seat','checkout'].includes(screen)&&it.id==='home')||screen===it.id?`2px solid ${C.teal}`:'2px solid transparent',transition:'all 150ms'}}>
          {it.label}
        </button>
      ))}
      <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
        <Badge variant="green"><span style={{width:6,height:6,borderRadius:'50%',background:C.success,display:'inline-block'}}></span> 라이브</Badge>
        <div style={{width:32,height:32,borderRadius:'50%',background:C.elevated,border:`2px solid ${C.teal}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:C.teal,cursor:'pointer'}}>K</div>
      </div>
    </nav>
  );
}

/* ── HOME ── */
function HomeScreen({ setScreen, setMatch }) {
  const [filter, setFilter] = useState('ALL');
  const sports = [{id:'ALL',label:'전체'},{id:'BASEBALL',label:'⚾ 야구'},{id:'SOCCER',label:'⚽ 축구'},{id:'BASKETBALL',label:'🏀 농구'}];
  const filtered = filter==='ALL' ? matches : matches.filter(m=>m.sport===filter);
  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'28px 28px'}}>
      <div style={{background:`linear-gradient(135deg, ${C.deep}, #1a2840)`,border:`1px solid ${C.border}`,borderRadius:16,padding:'36px 44px',marginBottom:36,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',right:0,top:0,bottom:0,width:'40%',background:'linear-gradient(90deg,transparent,rgba(93,187,160,0.04))'}}></div>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.1em',color:C.teal,textTransform:'uppercase',marginBottom:8}}>2025 시즌 · SPORTIFY</div>
        <h1 style={{fontSize:32,fontWeight:800,letterSpacing:'-0.03em',marginBottom:10,lineHeight:1.2}}>야구 · 축구 · 농구<br />한 곳에서 예매하세요</h1>
        <p style={{color:C.fg3,fontSize:14,marginBottom:22}}>실시간 대기열 · 좌석 선택 · 결제까지 원스톱</p>
        <div style={{display:'flex',gap:10}}>
          <Btn size="lg" onClick={()=>{ setMatch(matches[0]); setScreen('queue'); }}>대기열 입장 체험</Btn>
          <Btn variant="secondary" size="lg">경기 일정 보기</Btn>
        </div>
        <div style={{position:'absolute',right:48,top:'50%',transform:'translateY(-50%)',fontSize:64,opacity:.08}}>🏟️</div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:24}}>
        {sports.map(s=>(
          <button key={s.id} onClick={()=>setFilter(s.id)} style={{fontFamily:'inherit',cursor:'pointer',padding:'7px 16px',borderRadius:9999,fontSize:13,fontWeight:600,background:filter===s.id?C.teal:C.card,color:filter===s.id?C.deep:C.fg3,border:`1px solid ${filter===s.id?C.teal:C.border}`,transition:'all 150ms'}}>{s.label}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {filtered.map(m=><MatchCard key={m.id} match={m} onClick={()=>{ setMatch(m); setScreen('queue'); }} />)}
      </div>
    </div>
  );
}

function MatchCard({ match, onClick }) {
  const [hov, setHov] = useState(false);
  const sm = sportMeta[match.sport];
  const avail = match.status==='OPEN' && match.seats>0;
  return (
    <div onClick={avail?onClick:undefined} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:C.card,border:`1px solid ${hov&&avail?C.teal:C.border}`,borderRadius:12,overflow:'hidden',cursor:avail?'pointer':'default',transition:'all 200ms',boxShadow:hov&&avail?`0 0 20px rgba(93,187,160,0.12)`:'none',opacity:avail?1:0.6}}>
      <div style={{background:`linear-gradient(135deg,${sm.color}18,${sm.color}33)`,padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${sm.color}33`}}>
        <span style={{fontSize:26}}>{sm.icon}</span>
        <Badge variant={sm.badge}>{sm.label}</Badge>
      </div>
      <div style={{padding:'12px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontWeight:700,fontSize:14}}>{match.home}</span>
          <span style={{color:C.fg4,fontSize:11}}>vs</span>
          <span style={{fontWeight:700,fontSize:14}}>{match.away}</span>
        </div>
        <div style={{fontSize:12,color:C.fg3,marginBottom:3}}>📅 {match.date} · {match.time}</div>
        <div style={{fontSize:12,color:C.fg3,marginBottom:12}}>📍 {match.venue}</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:C.teal}}>₩{match.price.toLocaleString()}~</div>
            {avail && <div style={{fontSize:10,color:C.fg4}}>잔여 {match.seats}석</div>}
          </div>
          <Badge variant={match.seats===0?'gray':match.seats<20?'yellow':'green'}>
            {match.seats===0?'매진':match.seats<20?'마감 임박':'예매 가능'}
          </Badge>
        </div>
      </div>
    </div>
  );
}

/* ── QUEUE SCREEN ── */
function QueueScreen({ match, setScreen }) {
  const [position, setPosition] = useState(247);
  const [total, setTotal] = useState(1843);
  const [entered, setEntered] = useState(false);

  useEffect(() => {
    if (entered) return;
    const t = setInterval(() => {
      setPosition(p => {
        if (p <= 1) { clearInterval(t); setEntered(true); return 0; }
        return p - Math.floor(Math.random()*3+1);
      });
      setTotal(t => Math.max(t - Math.floor(Math.random()*5+2), position));
    }, 1200);
    return () => clearInterval(t);
  }, [entered]);

  const pct = Math.max(0, Math.min(100, Math.round((1 - position/total)*100)));
  const sm = sportMeta[match.sport];

  if (entered) return (
    <div style={{maxWidth:480,margin:'80px auto',padding:'0 28px',textAlign:'center',animation:'fadeIn 0.4s ease'}}>
      <div style={{width:80,height:80,borderRadius:'50%',background:`rgba(93,187,160,0.15)`,border:`2px solid ${C.teal}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 20px',boxShadow:`0 0 32px rgba(93,187,160,0.3)`}}>✅</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:8}}>입장 가능합니다!</h2>
      <p style={{color:C.fg3,fontSize:14,marginBottom:28}}>좌석 선택 화면으로 이동합니다. 예매 유효 시간: <strong style={{color:C.warning}}>15분</strong></p>
      <Btn size="lg" onClick={()=>setScreen('seat')}>좌석 선택하기 →</Btn>
    </div>
  );

  return (
    <div style={{maxWidth:520,margin:'0 auto',padding:'40px 28px'}}>
      <button onClick={()=>setScreen('home')} style={{background:'none',border:'none',cursor:'pointer',color:C.fg3,fontFamily:'inherit',fontSize:13,marginBottom:28,padding:0}}>← 홈으로</button>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:32,textAlign:'center'}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',color:C.fg4,textTransform:'uppercase',marginBottom:16}}>실시간 대기열</div>
        <div style={{fontSize:13,color:C.fg3,marginBottom:6}}>{sm.icon} {match.home} vs {match.away} · {match.date}</div>

        {/* Position display */}
        <div style={{margin:'24px 0',position:'relative'}}>
          <div style={{width:120,height:120,borderRadius:'50%',border:`3px solid ${C.border}`,margin:'0 auto',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',animation:'queuePulse 2s infinite'}}>
            <div style={{position:'absolute',inset:0,borderRadius:'50%',border:`3px solid ${C.teal}`,clipPath:`inset(0 ${100-pct}% 0 0 round 50%)`,transition:'all 1s ease'}}></div>
            <div style={{fontSize:36,fontWeight:800,color:C.teal,lineHeight:1}}>{position.toLocaleString()}</div>
            <div style={{fontSize:11,color:C.fg3}}>대기 순번</div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{background:C.elevated,borderRadius:9999,height:6,margin:'0 0 12px',overflow:'hidden'}}>
          <div style={{height:'100%',background:C.teal,borderRadius:9999,width:`${pct}%`,transition:'width 1s ease'}}></div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.fg4,marginBottom:24}}>
          <span>전체 대기: {total.toLocaleString()}명</span>
          <span>진행률: {pct}%</span>
        </div>

        <div style={{background:C.elevated,borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',justifyContent:'space-between',fontSize:13}}>
          <span style={{color:C.fg3}}>예상 대기 시간</span>
          <span style={{fontWeight:700,color:C.warning}}>약 {Math.ceil(position/15)}분</span>
        </div>

        <div style={{fontSize:12,color:C.fg4,lineHeight:1.6,background:C.elevated,borderRadius:8,padding:'10px 14px',textAlign:'left'}}>
          💡 창을 닫아도 <strong style={{color:C.fg3}}>30초 이내 재접속</strong>하면 순번이 유지됩니다.<br/>
          인당 최대 <strong style={{color:C.fg3}}>{match.seats > 0 ? 4 : 0}매</strong>까지 구매 가능합니다.
        </div>

        <button onClick={()=>setScreen('home')} style={{marginTop:20,background:'none',border:'none',cursor:'pointer',color:C.fg4,fontFamily:'inherit',fontSize:12}}>대기열 취소 (이탈)</button>
      </div>
    </div>
  );
}

/* ── SEAT SCREEN ── */
const seatRows = ['A','B','C','D','E','F','G','H'];
const soldSeats = ['A1','A3','B2','B6','C1','D3','D7','E2','F5','G1','H2','H8'];
const reservedSeats = ['A2','B4','C7','D1','E5','F3'];

function SeatScreen({ match, setScreen }) {
  const [selected, setSelected] = useState([]);
  const [zone, setZone] = useState('1루측');
  const zones = ['1루측','3루측','외야','VIP'];
  const sm = sportMeta[match.sport];
  const zp = {'1루측':match.price,'3루측':Math.round(match.price*.85),'외야':Math.round(match.price*.6),'VIP':match.price*2};

  const toggle = (seat) => {
    if (soldSeats.includes(seat)||reservedSeats.includes(seat)) return;
    setSelected(p => p.includes(seat)?p.filter(s=>s!==seat):p.length<4?[...p,seat]:p);
  };
  const st = (s) => soldSeats.includes(s)?'sold':reservedSeats.includes(s)?'reserved':selected.includes(s)?'selected':'free';
  const sc = {free:C.elevated,sold:'#1a1a24',reserved:'#2a1a3a',selected:C.teal};
  const tc = {free:C.fg4,sold:'#3a3a4a',reserved:'#5a3a6a',selected:C.deep};

  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 28px'}}>

            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{ch.type}</div>
              <div style={{fontSize:12,color:C.fg3}}>{ch.target}</div>
            </div>
            <Toggle value={ch.enabled} onChange={()=>toggleCh(ch.id)} />
            <button style={{background:'none',border:'none',cursor:'pointer',color:C.fg4,fontSize:12,padding:'4px 8px',borderRadius:6}}>삭제</button>
          </div>
        ))}
      </div>

      {/* 알림 이력 */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,fontSize:13,fontWeight:700}}>최근 알림 이력</div>
        {[
          {type:'MQTT',   event:'ticket.opened',     msg:'KT Wiz vs LG 예매 오픈!',          time:'10분 전', ok:true},
          {type:'EMAIL',  event:'payment.completed',  msg:'결제 완료 ₩25,000',                time:'2시간 전',ok:true},
          {type:'MQTT',   event:'game.starting',      msg:'KT Wiz 경기 1시간 후 시작합니다', time:'1일 전',  ok:true},
          {type:'EMAIL',  event:'payment.completed',  msg:'이메일 발송 실패 — 재시도 중',    time:'2일 전',  ok:false},
        ].map((h,i)=>(
          <div key={i} style={{padding:'12px 20px',borderBottom:i<3?`1px solid ${C.border}`:'none',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:16,flexShrink:0}}>{typeIcon[h.type]}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{h.msg}</div>
              <div style={{fontSize:10,color:C.fg4,fontFamily:'monospace'}}>{h.event}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:10,color:C.fg4,marginBottom:3}}>{h.time}</div>
              <span style={{fontSize:10,fontWeight:600,color:h.ok?C.success:C.error,background:h.ok?'rgba(62,207,142,0.1)':'rgba(239,68,68,0.1)',border:`1px solid ${h.ok?'rgba(62,207,142,0.2)':'rgba(239,68,68,0.2)'}`,borderRadius:9999,padding:'2px 7px'}}>{h.ok?'발송 완료':'실패'}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [screen, setScreen] = useState('home');
  const [match, setMatch] = useState(matches[0]);
  const screens = {
    home:      <HomeScreen setScreen={setScreen} setMatch={setMatch} />,
    queue:     <QueueScreen match={match} setScreen={setScreen} />,
    seat:      <SeatScreen match={match} setScreen={setScreen} />,
    checkout:  <CheckoutScreen match={match} setScreen={setScreen} />,
    mytickets: <MyTicketsScreen setScreen={setScreen} />,
    chat:      <ChatScreen />,
    notifications: <NotificationsScreen />,
    admin:     <AdminScreen />,
  };
  return (
    <div style={{minHeight:'100vh',background:C.dark}}>
      <NavBar screen={screen} setScreen={setScreen} />
      <div style={{animation:'fadeIn 0.2s ease'}}>{screens[screen]||screens.home}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
